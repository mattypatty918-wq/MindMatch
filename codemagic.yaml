# Codemagic CI/CD for memory-match-game
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "15.0"
        APP_NAME: "memory-match-game"
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/memory-match-game.git --depth 1
      - cd memory-match-game && git submodule update --init --recursive
      - cd memory-match-game && xcode-project fetch-dependencies --use-cache
      - cd memory-match-game && xcode-project build --workspace ios/App.xcworkspace --scheme App --configuration Release
    artifacts:
      - memory-match-game/ios/App/App.xcarchive
    publishing:
      app_store_connect:
        api_key: Whitefoxes
