# Codemagic CI/CD for MindMatch
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "15.0"
        APP_NAME: "MindMatch"
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/mind-match.git --depth 1
      - cd mind-match && git submodule update --init --recursive
      - cd mind-match && xcode-project fetch-dependencies --use-cache
      - cd mind-match && xcode-project build --workspace ios/App.xcworkspace --scheme App --configuration Release
    artifacts:
      - mind-match/ios/App/App.xcarchive
    publishing:
      app_store_connect:
        api_key: Whitefoxes